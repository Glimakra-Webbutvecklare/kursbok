<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Bakgrund -->
  <rect width="600" height="400" fill="#f5f5f5"/>
  
  <!-- Källbild (Source Image) -->
  <g id="source">
    <rect x="20" y="20" width="200" height="200" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="120" y="15" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1976d2">Källbild (Source Image)</text>
    
    <!-- Grid lines för att visa frames -->
    <line x1="70" y1="20" x2="70" y2="220" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="120" y1="20" x2="120" y2="220" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="170" y1="20" x2="170" y2="220" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="20" y1="70" x2="220" y2="70" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="20" y1="120" x2="220" y2="120" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="20" y1="170" x2="220" y2="170" stroke="#90caf9" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Markerad region (sx, sy, sWidth, sHeight) -->
    <rect x="70" y="70" width="50" height="50" fill="#ff9800" fill-opacity="0.3" stroke="#ff6f00" stroke-width="2"/>
    <text x="95" y="65" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff6f00">sx, sy</text>
    <text x="125" y="95" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff6f00">sWidth</text>
    <text x="95" y="130" text-anchor="middle" font-family="Arial" font-size="11" fill="#ff6f00">sHeight</text>
  </g>
  
  <!-- Pil från källa till destination -->
  <path d="M 220 95 L 280 95" stroke="#424242" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="250" y="90" text-anchor="middle" font-family="Arial" font-size="12" fill="#424242">drawImage()</text>
  
  <!-- Destination Canvas -->
  <g id="destination">
    <rect x="320" y="20" width="200" height="200" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="420" y="15" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#e65100">Destination Canvas</text>
    
    <!-- Markerad position (dx, dy, dWidth, dHeight) -->
    <rect x="370" y="120" width="50" height="50" fill="#4caf50" fill-opacity="0.3" stroke="#2e7d32" stroke-width="2"/>
    <text x="395" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">dx, dy</text>
    <text x="425" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">dWidth</text>
    <text x="395" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2e7d32">dHeight</text>
  </g>
  
  <!-- Förklaring -->
  <g id="explanation">
    <rect x="20" y="250" width="560" height="130" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" rx="5"/>
    <text x="300" y="275" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#212121">drawImage() Parametrar</text>
    
    <text x="40" y="300" font-family="Arial" font-size="12" fill="#424242">
      <tspan font-weight="bold">sx, sy:</tspan> Startposition i källbilden (övre vänstra hörnet)
    </text>
    <text x="40" y="320" font-family="Arial" font-size="12" fill="#424242">
      <tspan font-weight="bold">sWidth, sHeight:</tspan> Storlek på området att kopiera från källbilden
    </text>
    <text x="40" y="340" font-family="Arial" font-size="12" fill="#424242">
      <tspan font-weight="bold">dx, dy:</tspan> Position på destination canvas (övre vänstra hörnet)
    </text>
    <text x="40" y="360" font-family="Arial" font-size="12" fill="#424242">
      <tspan font-weight="bold">dWidth, dHeight:</tspan> Storlek att rita på destination canvas (kan skala)
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#424242"/>
    </marker>
  </defs>
</svg>



